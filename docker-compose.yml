# SaaS Starter Lite — PostgreSQL only
# Full version includes Redis, MinIO, pgAdmin, RedisInsight: https://demo.cloudrix.io

services:
  postgres:
    image: postgres:16-alpine
    container_name: saas-lite-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-saas_lite_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
